name = "dealak-backend"
main = "backend/worker.ts"
compatibility_date = "2024-04-01"
compatibility_flags = ["nodejs_compat"]

# ──────────────────────────────────────────────────────────────────────────
# D1 Database
# ──────────────────────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "dealak-db"
database_id = "YOUR_D1_DATABASE_ID"

# ──────────────────────────────────────────────────────────────────────────
# KV Storage (for caching and sessions)
# ──────────────────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "CACHE"
id = "YOUR_KV_NAMESPACE_ID"

# ──────────────────────────────────────────────────────────────────────────
# R2 Storage (for images and files)
# ──────────────────────────────────────────────────────────────────────────
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "dealak-storage"

# ──────────────────────────────────────────────────────────────────────────
# Environment Variables
# ──────────────────────────────────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"
APP_NAME = "DEALAK"
APP_VERSION = "1.0.0"
CURRENCY = "SYP"
JWT_SECRET = "your-jwt-secret-key-change-in-production"

# ──────────────────────────────────────────────────────────────────────────
# Pages Configuration (for frontend)
# ──────────────────────────────────────────────────────────────────────────
[pages]
build_output_dir = "frontend/.next"
compatibility_flags = ["nodejs_compat"]

# ──────────────────────────────────────────────────────────────────────────
# Routes
# ──────────────────────────────────────────────────────────────────────────
[routes]
pattern = "api/*"
zone_name = "abdalgani.com"

# ──────────────────────────────────────────────────────────────────────────
# Cron Triggers (for scheduled tasks)
# ──────────────────────────────────────────────────────────────────────────
[triggers]
crons = ["0 * * * *"]  # Every hour
