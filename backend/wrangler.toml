# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  DEALAK Real Estate Platform — Cloudflare Workers Configuration       ║
# ╚══════════════════════════════════════════════════════════════════════════╝

name = "dealak-backend"
main = "worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ──────────────────────────────────────────────────────────────────────────
# D1 Database
# ──────────────────────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "dealak-db"
database_id = "ec0d925e-1978-4341-a191-de24119b5e9b"

# ──────────────────────────────────────────────────────────────────────────
# KV Storage (for caching and sessions)
# ──────────────────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "CACHE"
id = "5fc6b497f9d8409da6defa4fc6c33320"

# ──────────────────────────────────────────────────────────────────────────
# Environment Variables
# ──────────────────────────────────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"
APP_NAME = "DEALAK"
APP_VERSION = "1.0.0"
CURRENCY = "SYP"
JWT_SECRET = "dealak-jwt-secret-2026-syria"
